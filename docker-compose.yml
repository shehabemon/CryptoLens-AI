services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: cryptolens
      POSTGRES_PASSWORD: cryptolens_dev
      POSTGRES_DB: cryptolens
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cryptolens"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
